name: Deploy client to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-local-package:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install server dependencies
        working-directory: server
        run: npm ci

      - name: Build HomeShare Local ZIP
        working-directory: server
        run: npm run build:local-package

      - name: Build HomeShare Local EXE
        working-directory: server
        continue-on-error: true
        shell: pwsh
        run: |
          npm run build:local-exe
          if (Test-Path ../dist/local/HomeShare-Local.exe) {
            New-Item -ItemType Directory -Force -Path ../client/public/downloads | Out-Null
            Copy-Item ../dist/local/HomeShare-Local.exe ../client/public/downloads/HomeShare-Local.exe -Force
            Write-Host "EXE copied to client/public/downloads"
          } else {
            Write-Host "EXE was not produced"
          }

      - uses: actions/upload-artifact@v4
        with:
          name: homeshare-local-zip
          path: |
            client/public/downloads/HomeShare-Local-Windows.zip
            client/public/downloads/HomeShare-Local.exe
          if-no-files-found: warn
          retention-days: 1

  build:
    needs: build-local-package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download local package for site
        uses: actions/download-artifact@v4
        with:
          name: homeshare-local-zip
          path: client/public/downloads

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install and build
        working-directory: client
        env:
          PUBLIC_URL: /${{ github.event.repository.name }}
          REACT_APP_API_URL: ${{ secrets.REACT_APP_API_URL }}
          REACT_APP_RECAPTCHA_SITE_KEY: ${{ secrets.REACT_APP_RECAPTCHA_SITE_KEY }}
        run: |
          npm ci
          npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: client/build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
